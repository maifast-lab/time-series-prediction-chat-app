name: Deploy Maifast 

on:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SITE_URL: http://localhost:3001
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: test-google-client-id.apps.googleusercontent.com
      NEXT_PUBLIC_BACKEND_URL: http://localhost:3000
      PYTHON_BACKEND_URL: http://127.0.0.1:8000/api/

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build

  deploy:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            export PATH="/root/.nvm/versions/node/v24.15.0/bin:/usr/local/bin:/usr/bin:$PATH"
            corepack enable
            git config --global --add safe.directory /home/maifast/htdocs/www.maifast.com
            cd /home/maifast/htdocs/www.maifast.com
            git fetch origin
            git reset --hard origin/main
            pnpm install --frozen-lockfile
            pnpm run build
            pm2 restart maifast || pm2 restart 1
            pm2 save
